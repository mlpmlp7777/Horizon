  <path d="M352 522 L470 640 L700 370" fill="none" stroke="#62DFFF" stroke-opacity="0.42" stroke-width="118" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
  <path d="M352 522 L470 640 L700 370" fill="none" stroke="url(#check)" stroke-width="76" stroke-linecap="round" stroke-linejoin="round"/>

<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="plate" x1="150" y1="120" x2="860" y2="920" gradientUnits="userSpaceOnUse">
